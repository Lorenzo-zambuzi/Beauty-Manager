<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
		<link rel="stylesheet" href="/css/Barra-style.css">
		<link rel="stylesheet" href="/css/Lista-style.css">
		
		<title>Lista de Profissionais</title>
	</head>
<body>
	
	<!--Começo da Barra lateral-->
		<nav class="menu-lateral">

		     <div class="btn-expandir">
		     	<i class="bi bi-list"></i>
		     </div>

			<ul>
		    	<li class="item-menu">
		        	<a th:href="@{/way/index}">
		            	<span class="icon"><i class="bi bi-house"></i></span>
		                <span class="txt-link">Home</span>
		            </a>
		        </li>

		        <li class="item-menu">
		        	<a th:href="@{/way/agendamento}">
		            	<span class="icon"><i class="bi bi-calendar"></i></span>
		                <span class="txt-link">Agenda</span>
		            </a>
		        </li>
				
		        <li class="item-menu">
		        	<a th:href="@{/way/profissional}">
		            	<span class="icon"><i class="bi bi-person-vcard"></i></span>
		                <span class="txt-link">Profissionais</span>
		            </a>
				</li>
				
		        <li class="item-menu">
		        	<a th:href="@{/way/cliente}">
		            	<span class="icon"><i class="bi bi-people"></i></span>
		                <span class="txt-link">Clientes</span>
		            </a>
		        </li>
				
		        <li class="item-menu">
		        	<a th:href="@{/way/servico}">
		            	<span class="icon"><i class="bi bi-scissors"></i></span>
		                <span class="txt-link">Serviços</span>
		            </a>
		        </li>

				<li class="item-menu">
					<a th:href="@{/way/estatisticas}">
						<span class="icon"><i class="bi bi-percent"></i></span>
						<span class="txt-link">Estatísticas</span>
					</a>
				</li>
				
				<li class="item-menu">
					<a th:href="@{/way/out}">
						<span class="icon"><i class="bi bi-box-arrow-left"></i></span>
						<span class="txt-link">Sair</span>
					</a>
				</li>
		    </ul>
		</nav>
		<!--Fim da Barra Lateral-->
		
	<main class="corpo">
		
		<h2>Agenda</h2>
		<a th:href="@{/agendamento/novo}" class="btn-novo">Novo</a>
		 <table class="table">
			<thead class="table-dark">
				<tr>
					<th>ID</th>
					<th>Cabeleireiro</th>
					<th>Serviço</th>
					<th>Cliente</th>
					<th>Data</th>
					<th>Horário</th>
					<th>Preço</th>
				</tr>
			</thead>
			
			<tr th:each="agendamento : ${agendamentos}">
				<td th:text="${agendamento.idAgendamento}"></td>
				
				<td>
					<p th:each="cabeleireiro : ${cabeleireiros}" 
					th:text="${cabeleireiro.idProfissional == agendamento.idProfissional} ? ${cabeleireiro.nome} : ''">
					</p>
				</td>
				
				<td>
					<p th:each="servico : ${servicos}" 
					th:text="${servico.idServico == agendamento.idServico} ? ${servico.nome} : ''">
					</p>
				</td>
				
				<td>
					<p th:each="cliente : ${clientes}"
					th:text="${cliente.idCliente == agendamento.idCliente} ? ${cliente.nome} : ''">	
					</p>
				</td>
				
				<td th:text="${#temporals.format(agendamento.data,'dd/MM/yyyy')}"></td>
				
				<td th:text="${agendamento.horario}"></td>
				
				<td>
					<p th:each="servico : ${servicos}" 
					th:text="${servico.idServico == agendamento.idServico} ? 'R$ '+${#numbers.formatDecimal(servico.preco, 1, 'POINT', 2, 'COMMA')} : ''">
					</p>
				</td>
				
				<td class="icones">
					<a th:href="@{/agendamento/editar/{idAgendamento} (idAgendamento=${agendamento.idAgendamento})}">
						<span>
							<i class="bi bi-pencil-square"></i>
						</span>
					</a>
					<a th:href="@{/agendamento/deletar/{idAgendamento} (idAgendamento=${agendamento.idAgendamento})}">
						<span>
							<i class="bi bi-trash"></i>
						</span>
					</a>
				</td>
			</tr>
			
		</table>
	</main>
</body>	
</html>
